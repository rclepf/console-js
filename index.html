<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Sandbox Pro - IDE Pedagógica</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.2/ace.js" type="text/javascript" charset="utf-8"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.2/ext-language_tools.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            display: flex; flex-direction: column; height: 100vh;
            background-color: #1e1e1e; color: #f4f4f4;
            font-family: 'Segoe UI', sans-serif;
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px; background-color: #2d2d2d;
            border-bottom: 1px solid #3c3c3c; z-index: 10;
        }

        h1 { font-size: 1.1rem; color: #4fc1ff; display: flex; align-items: center; gap: 8px; }

        .btn-group { display: flex; gap: 10px; }
        button {
            padding: 8px 14px; border: none; border-radius: 4px;
            cursor: pointer; font-weight: bold; font-size: 0.85rem;
            transition: all 0.2s; display: flex; align-items: center; gap: 5px;
        }
        .btn-run { background-color: #4caf50; color: white; }
        .btn-run:hover { background-color: #388e3c; transform: scale(1.05); }
        .btn-copy { background-color: #3c3c3c; color: white; }
        .btn-save { background-color: #007acc; color: white; }
        .btn-clear { background-color: #f44336; color: white; }

        .workspace { display: flex; flex: 1; overflow: hidden; }

        /* Estilo do Editor */
        .editor-container {
            flex: 1.2; display: flex; flex-direction: column;
            border-right: 2px solid #3c3c3c;
        }
        #editor { flex: 1; font-size: 16px; }

        .section-title {
            background-color: #252526; padding: 8px 15px;
            font-size: 0.75rem; text-transform: uppercase;
            color: #888; letter-spacing: 1px;
            display: flex; justify-content: space-between;
        }

        /* Outputs */
        .output-container { flex: 1; display: flex; flex-direction: column; background-color: #1e1e1e; }
        .panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .panel:first-child { border-bottom: 2px solid #3c3c3c; }

        .terminal {
            flex: 1; background-color: #0c0c0c; color: #d4d4d4;
            font-family: 'Fira Code', 'Consolas', monospace;
            padding: 12px; overflow-y: auto; font-size: 0.9rem;
            line-height: 1.4;
        }
        .log-info { color: #b5cea8; border-bottom: 1px solid #222; padding: 2px 0; }
        .log-error { color: #f44747; background: rgba(244, 71, 71, 0.1); padding: 2px 5px; border-radius: 2px; }

        iframe { flex: 1; background-color: white; border: none; }
        
        /* Ajuste do scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e1e1e; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }
    </style>
</head>
<body>

    <header>
        <h1><span>⚡</span> JS Sandbox Pro</h1>
        <div class="btn-group">
            <button class="btn-run" onclick="runCode()">▶ EXECUTAR</button>
            <button class="btn-copy" onclick="copyCode()">📋 COPIAR</button>
            <button class="btn-save" onclick="saveCode()">💾 SALVAR .JS</button>
            <button class="btn-clear" onclick="clearAll()">🗑️ LIMPAR</button>
        </div>
    </header>

    <div class="workspace">
        <div class="editor-container">
            <div class="section-title">
                <span>Editor de Código</span>
                <span id="cursor-pos">Lin 1, Col 1</span>
            </div>
            <div id="editor"></div>
        </div>

        <div class="output-container">
            <div class="panel">
                <div class="section-title">Console / Terminal</div>
                <div id="terminal-output" class="terminal"></div>
            </div>
            <div class="panel">
                <div class="section-title">Preview Web (DOM)</div>
                <div id="web-preview-wrapper" style="flex: 1; display: flex;">
                    <iframe id="web-preview"></iframe>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Inicialização do Ace Editor
        const editor = ace.edit("editor");
        editor.setTheme("ace/theme/monokai"); // Tema escuro estilo VS Code
        editor.session.setMode("ace/mode/javascript"); // Linguagem
        
        // Configurações Pro
        editor.setOptions({
            enableBasicAutocompletion: true,
            enableLiveAutocompletion: true,
            enableSnippets: true,
            showPrintMargin: false,
            highlightActiveLine: true,
            useSoftTabs: true,
            tabSize: 4
        });

        // Código inicial pedagógico
        const defaultCode = `// 🟢 MODO TERMINAL (Saída de dados)
console.log("Olá! Eu sou o terminal.");
console.log("Estou processando um cálculo:", 10 * 5);

// 🔵 MODO WEB (Interação visual)
document.body.innerHTML = \`
    <div style="text-align:center; padding: 40px;">
        <h1 style="color: #007acc">Aprendendo JS 🚀</h1>
        <p>O JavaScript deu vida a esta tela!</p>
        <button id="btn" style="padding:10px; cursor:pointer">Mudar Cor</button>
    </div>
\`;

document.getElementById('btn').onclick = () => {
    document.body.style.backgroundColor = 'gold';
    console.log("O botão foi clicado na web!");
};`;

        editor.setValue(defaultCode, -1);

        // Atualiza posição do cursor no rodapé do editor
        editor.selection.on('changeCursor', () => {
            const pos = editor.getCursorPosition();
            document.getElementById('cursor-pos').innerText = `Lin ${pos.row + 1}, Col ${pos.column + 1}`;
        });

        function runCode() {
            const code = editor.getValue();
            const terminal = document.getElementById('terminal-output');
            const previewWrapper = document.getElementById('web-preview-wrapper');
            
            terminal.innerHTML = '';
            previewWrapper.innerHTML = '<iframe id="web-preview"></iframe>';
            
            const iframe = document.getElementById('web-preview');
            const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;

            const scriptInjetável = `
                <script>
                    const _log = console.log;
                    console.log = (...args) => {
                        _log(...args);
                        window.parent.postMessage({ type: 'log', text: args.map(a => 
                            typeof a === 'object' ? JSON.stringify(a) : String(a)
                        ).join(' ') }, '*');
                    };
                    window.onerror = (m, s, l, c, e) => {
                        window.parent.postMessage({ type: 'error', text: m + " (Linha " + (l - 1) + ")" }, '*');
                    };
                <\/script>
            `;

            iframeDoc.open();
            iframeDoc.write(scriptInjetável + '<body></body><script>' + code + '<\/script>');
            iframeDoc.close();
        }

        window.addEventListener('message', (event) => {
            const terminal = document.getElementById('terminal-output');
            if (!event.data || !event.data.type) return;

            const messageDiv = document.createElement('div');
            messageDiv.className = event.data.type === 'log' ? 'log-info' : 'log-error';
            messageDiv.textContent = event.data.type === 'log' ? `> ${event.data.text}` : `✖ ${event.data.text}`;
            
            terminal.appendChild(messageDiv);
            terminal.scrollTop = terminal.scrollHeight;
        });

        function copyCode() {
            navigator.clipboard.writeText(editor.getValue()).then(() => alert('Código copiado!'));
        }

        function saveCode() {
            const blob = new Blob([editor.getValue()], { type: 'text/javascript' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'aula-javascript.js';
            a.click();
            URL.revokeObjectURL(url);
        }

        function clearAll() {
            editor.setValue('', -1);
            document.getElementById('terminal-output').innerHTML = '';
            runCode();
        }

        // Atalho de teclado: CTRL + ENTER para rodar
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') runCode();
        });
    </script>
</body>
</html>
